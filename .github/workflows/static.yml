<body>
<div class="particles" id="particles" aria-hidden="true"></div>
<main class="story-container">
  <nav class="nav-chapters" id="navMenu">
    <button class="nav-btn" data-chapter="museum" aria-current="true">🏛️ 博物馆奇遇</button>
    <button class="nav-btn" data-chapter="soul">💫 前世今生</button>
    <button class="nav-btn" data-chapter="evolution">📜 徽派千年·演进史</button>
    <button class="nav-btn" data-chapter="ming2">🌟 明末清初·鼎盛</button>
    <button class="nav-btn" data-chapter="modern">🔮 今世·活化创新</button>
  </nav>

