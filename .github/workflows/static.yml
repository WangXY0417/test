    .cultural-grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-top: 1rem; }
    .timeline-grid { display: grid; gap: 1.2rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin: 1rem 0; }
    .timeline-item { border-radius: 1.2rem; padding: 1.2rem; background: rgba(255, 255, 240, 0.78); border: 1px solid #e9d6b0; cursor: pointer; transition: transform 0.2s, background 0.2s; }
    .timeline-item:hover { background: rgba(255, 245, 215, 0.96); border-color: var(--gold); transform: translateY(-4px); }
