      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    @media (max-width: 640px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    .stat-card {
      background: transparent !important;
      border-radius: 1.2rem;
      padding: 0.9rem;
      text-align: center;
      transition: transform 0.2s;
