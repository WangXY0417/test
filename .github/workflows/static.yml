// 【重绘优化版】徽州古风词云 · 适配徽派色调、重点词汇放大、布局更舒适
function drawBeautifulWordCloud(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = 780, h = 500;
  canvas.width = w;
  canvas.height = h;

  // 1. 古风宣纸渐变背景
  const bgGradient = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
  bgGradient.addColorStop(0, '#fff9ee');
  bgGradient.addColorStop(1, '#f3e9d8');
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, w, h);

  // 2. 浅淡水墨远山纹理装饰
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#4a3a24';
  ctx.beginPath();
  ctx.moveTo(0, h - 60);
  ctx.bezierCurveTo(w*0.25, h-120, w*0.55, h-80, w*0.75, h-110);
  ctx.bezierCurveTo(w*0.9, h-130, w, h-90, w, h-70);
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 3. 字体 & 国风配色
  const fontList = '"Noto Serif SC", "楷体", "宋体", serif';
  const ancientColorPool = [
    '#2c241a', '#423524', '#5e4b2b', '#705535',
    '#8c6d31', '#a0783c', '#b48c2c', '#916b26'
  ];

  // 4. 词汇权重分级：核心建筑词超大、非遗词汇中等、普通词汇偏小
  const highWeight = ['马头墙','粉墙黛瓦','三雕绝艺','天井','四水归堂','榫卯'];
  const midWeight = ['砖雕','木雕','石雕','冬瓜梁','雀替','水圳','徽商','黟县青'];
  let termsWithWeight = wordCloudTerms.map(term => {
    let weight = 1.0;
    if(highWeight.includes(term)) weight += 1.2;
    else if(midWeight.includes(term)) weight += 0.6;
    else weight += Math.random() * 0.4;
    return { text: term, weight };
  });

  // 权重倒序，大词优先排布
  termsWithWeight.sort((a,b) => b.weight - a.weight);

  const placed = [];
  const centerX = w / 2;
  const centerY = h / 2;

  // 5. 螺旋发散布局，减少重叠，排版更自然
  for (let item of termsWithWeight) {
    // 字号区间：核心大词 24~52，普通词 16~28
    let fontSize = Math.min(52, Math.max(16, 16 + item.weight * 14));
    ctx.font = `700 ${fontSize}px ${fontList}`;
    const textMetrics = ctx.measureText(item.text);
    const textW = textMetrics.width;
    const textH = fontSize * 1.15;

    let isPlaced = false;
    let angle = 0;
    let radius = 0;
    // 螺旋寻位
    for (let i = 0; i < 1600; i++) {
      angle += 0.22;
      radius += 1.8;
      let x = centerX + Math.cos(angle) * radius;
      let y = centerY + Math.sin(angle) * radius * 0.75;

      // 边界限制
      if(x < 20 || x > w-20 || y < 35 || y > h-35) continue;

      // 碰撞检测
      let overlap = false;
      for(let p of placed){
        if (Math.abs(x - p.x) < (textW/2 + p.w/2 + 6) &&
            Math.abs(y - p.y) < (textH/2 + p.h/2 + 6)) {
          overlap = true;
          break;
        }
      }

      if(!overlap){
        placed.push({ x, y, w:textW, h:textH, text:item.text, fs:fontSize });
        isPlaced = true;
        break;
      }
    }
    // 兜底随机放置
    if(!isPlaced){
      placed.push({
        x: 40 + Math.random()*(w-80),
        y: 40 + Math.random()*(h-80),
        w:textW, h:textH, text:item.text, fs:fontSize
      });
    }
  }

  // 6. 绘制文字 + 柔和投影，国风质感
  ctx.shadowColor = 'rgba(90,75,45,0.15)';
  ctx.shadowBlur = 4;
  placed.forEach((item, idx) => {
    ctx.font = `700 ${item.fs}px ${fontList}`;
    ctx.fillStyle = ancientColorPool[idx % ancientColorPool.length];
    ctx.fillText(item.text, item.x - item.w/2, item.y + item.fs/3);
  });
  ctx.shadowBlur = 0;

  // 7. 右下角古风落款印章
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#b48c2c';
  ctx.font = '22px 楷体';
  ctx.fillText('徽州匠魂', w - 90, h - 28);
  ctx.globalAlpha = 1;
}
