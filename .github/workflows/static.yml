      color: var(--gold);
      margin-bottom: 0.4rem;
    }
    .chart-container {
      width: 100%;
      margin: 0.5rem 0;
      min-height: 200px;
    }
    .pie-chart-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      min-height: 200px;
    }
    canvas#craftsChart, canvas#craftsPieChart {
