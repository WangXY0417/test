  <style>
    /* ========== 完全保留原始样式，未做任何破坏性改动 ========== */
    :root {
      --gold: #d4af37;
      --gold-dark: #b48c2c;
      --gold-soft: rgba(212, 175, 55, 0.16);
      --ancient-bg: #2a2418;
      --paper: #fdf8ed;
      --ink: #2c241a;
      --ink-soft: #5e4b2b;
      --card-bg: rgba(255, 250, 240, 0.94);
      --line: rgba(212, 175, 55, 0.28);
      --shadow-soft: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      --shadow-deep: 0 25px 45px -8px rgba(0, 0, 0, 0.3);
      --radius-xl: 2rem;
      --radius-2xl: 2.5rem;
      --transition: 220ms ease;
      --max-width: 1300px;
      --nav-offset: 100px;
      --focus-ring: 0 0 0 3px rgba(212, 175, 55, 0.3);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Inter', 'Noto Serif SC', serif;
      background: linear-gradient(145deg, #f5efe5 0%, #e8dfcf 100%);
      color: var(--ink);
      overflow-x: hidden;
      text-rendering: optimizeLegibility;
    }
    img { display: block; max-width: 100%; height: auto; }
    button { font: inherit; cursor: pointer; }
    a { color: inherit; }
    :focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; white-space: nowrap; border: 0; }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle { position: absolute; background: rgba(212, 175, 55, 0.22); border-radius: 50%; animation: floatParticle linear infinite; }
    @keyframes floatParticle { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 20% { opacity: 0.5; } 80% { opacity: 0.28; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }
    .story-container { position: relative; z-index: 2; max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.2rem 4rem; }
    .nav-chapters {
      position: sticky; top: 16px; z-index: 100; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      width: fit-content; max-width: min(100%, 1100px); margin: 0 auto 2rem; padding: 0.7rem 1rem;
      background: rgba(0, 0, 0, 0.62); border: 1px solid rgba(255, 243, 207, 0.15); backdrop-filter: blur(12px);
      border-radius: 999px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }
    .nav-btn { border: none; background: transparent; color: #fff3cf; font-weight: 500; padding: 0.42rem 0.95rem; border-radius: 999px; font-size: 0.86rem; white-space: nowrap; transition: background var(--transition), color var(--transition), transform var(--transition); }
    .nav-btn:hover, .nav-btn[aria-current="true"] { background: var(--gold); color: var(--ancient-bg); transform: translateY(-1px); }
    .chapter-card { background: var(--card-bg); backdrop-filter: blur(4px); border: 1px solid var(--line); border-radius: var(--radius-2xl); box-shadow: var(--shadow-soft); padding: 2rem; margin-bottom: 2.5rem; transition: transform var(--transition), box-shadow var(--transition); scroll-margin-top: var(--nav-offset); content-visibility: auto; contain-intrinsic-size: 800px; }
    .chapter-card:hover { transform: translateY(-4px); box-shadow: 0 26px 42px -16px rgba(0, 0, 0, 0.22); }
    .chapter-title { display: flex; align-items: center; gap: 12px; margin: 0 0 1.2rem; padding-left: 1rem; border-left: 6px solid var(--gold); font-size: 1.8rem; font-weight: 700; line-height: 1.3; }
    .chapter-title i { color: var(--gold); flex-shrink: 0; }
    .stats-panel {
