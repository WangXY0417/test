        datasets: [
          { label: '黄山市域现存徽派古建 (处)', data: ancientBuildings, type: 'bar', yAxisID: 'y-left', backgroundColor: getBarColors(years.length), borderWidth: 1, borderRadius: 6, order: 2 },
          { label: '历史建筑 (黄山市) / 处', data: historicBuildings, type: 'line', yAxisID: 'y-right', borderColor: '#e67e22', borderWidth: 3, pointBackgroundColor: '#e67e22', pointRadius: 4, tension: 0.2, fill: false, order: 1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          tooltip: { backgroundColor: '#1f1a12e6', titleColor: '#f5e6b0', bodyColor: '#fff3cf', borderColor: '#d4af37' },
          legend: { position: 'top', labels: { color: '#3a2c1c' } }
        },
        scales: {
          'y-left': { position: 'left', title: { display: true, text: '徽派古建数量 (处)', color: '#b48c2c' } },
          'y-right': { position: 'right', title: { display: true, text: '历史建筑数量 (处)', color: '#e67e22' }, grid: { drawOnChartArea: false } },
          x: { grid: { display: false } }
        }
      }
    });

    // 图表2
    const ctx2 = document.getElementById('compositeChart2').getContext('2d');
    new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: years,
        datasets: [
          { label: '完整三维数据模型 (栋)', data: digitalModels, type: 'bar', yAxisID: 'y-left-model', backgroundColor: getBarColors(years.length), borderRadius: 6, order: 3 },
          { label: '中国传统村落 (个)', data: traditionalVillages, type: 'line', yAxisID: 'y-right-village', borderColor: '#e67e22', borderWidth: 3, pointBackgroundColor: '#e67e22', tension: 0.2, order: 2 },
          { label: '国家级名城/名镇/名村 (个)', data: famousTowns, type: 'line', yAxisID: 'y-right-village', borderColor: '#c0392b', borderDash: [5,5], borderWidth: 2.5, pointBackgroundColor: '#c0392b', tension: 0.2, order: 1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: {
          tooltip: { backgroundColor: '#1f1a12e6', titleColor: '#f5e6b0', bodyColor: '#fff3cf', borderColor: '#d4af37' },
          legend: { position: 'top', labels: { color: '#3a2c1c' } }
        },
        scales: {
          'y-left-model': { position: 'left', title: { display: true, text: '三维数据模型 (栋)', color: '#b48c2c' } },
          'y-right-village': { position: 'right', title: { display: true, text: '村落数量 / 名城名镇名村 (个)', color: '#c97e2a' }, grid: { drawOnChartArea: false } },
          x: { grid: { display: false } }
        }
      }
    });

    // ✅ 第五章今世传承图表（仅保留非遗传承人+文创收入）
    const modernYears = ['2015', '2017', '2019', '2021', '2024'];
    // 非遗传承人数据
    const national = [8, 15, 26, 38, 52];
    const provincial = [12, 22, 35, 48, 65];
    const city = [25, 38, 52, 66, 82];
    // 文创收入
    const culturalIncome = [320, 980, 1860, 3200, 4800];

    // 非遗传承人图表
    new Chart(document.getElementById('inheritanceChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: modernYears,
        datasets: [
          { label: '国家级传承人', data: national, borderColor: '#d4af37', backgroundColor: 'rgba(212,175,55,0.2)', tension: 0.3, fill: true },
          { label: '省级传承人', data: provincial, borderColor: '#b48c2c', backgroundColor: 'rgba(180,140,44,0.2)', tension: 0.3, fill: true },
          { label: '市级传承人', data: city, borderColor: '#e8c468', backgroundColor: 'rgba(232,196,104,0.2)', tension: 0.3, fill: true }
        ]
      },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
    });

    // 文创收入柱状图
    new Chart(document.getElementById('culturalChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: modernYears,
        datasets: [{ label: '文创年收入(万元)', data: culturalIncome, backgroundColor: getBarColors(modernYears.length), borderRadius: 6 }]
      },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
    });

    // 粒子背景
    function initParticles() {
      const container = document.createElement('div');
      container.className = 'particles-bg';
      document.body.appendChild(container);
      for (let i = 0; i < 48; i++) {
        const p = document.createElement('div');
        const size = Math.random()*8+2;
        p.style.cssText = `position:absolute;width:${size}px;height:${size}px;background:rgba(212,175,55,${Math.random()*0.28+0.05});border-radius:50%;top:${Math.random()*100}%;left:${Math.random()*100}%;animation:floatParticle ${Math.random()*20+12}s linear infinite;animation-delay:${Math.random()*10}s`;
        container.appendChild(p);
      }
    }
    initParticles();
  })();
</script>
</body>
</html>
